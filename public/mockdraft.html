<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MADCAP Mock Draft Board">
    <title>MADCAP - Mock Draft Board</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>

    <div class="breadcrumb">
        <a href="index.html">MADCAP Index</a><span class="middot">&middot;</span> Mock Draft Board
    </div>

    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>
    <div id="mockdraft-container"></div>
    <div id="page-footer"></div>
</div>

<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var loading = document.getElementById('loading-indicator');
        if (loading) loading.style.display = 'block';
        loadAllData().then(function() {
            if (loading) loading.style.display = 'none';
            var container = document.getElementById('mockdraft-container');
            var mocks = DATA.mock_drafts || [];
            var html = '';
            for (var m = 0; m < mocks.length; m++) {
                var md = mocks[m];
                html += '<table class="forumline"><tr><th class="catHead" colspan="6">' + (md.title || 'Mock Draft') + ' - ' + (md.year || '?') + '</th></tr>';
                html += '<tr><th class="thHead tCenter">Rank</th><th class="thHead">Player</th><th class="thHead tCenter">Pos</th><th class="thHead">School</th><th class="thHead">Team</th><th class="thHead">Notes</th></tr>';
                var picks = md.picks || [];
                for (var i = 0; i < picks.length; i++) {
                    var pk = picks[i];
                    var player = pk.player_id ? getPlayerById(pk.player_id) : null;
                    var team = pk.team_id ? getTeamById(pk.team_id) : null;
                    html += '<tr class="' + rowClass(i) + '"><td class="tCenter bold">' + (pk.rank || i+1) + '</td>';
                    html += '<td>' + (player ? '<a href="player.html?id=' + player.id + '">' + player.name + '</a>' : (pk.player_name || '?')) + '</td>';
                    html += '<td class="tCenter">' + (pk.position || '-') + '</td>';
                    html += '<td class="gensmall">' + (pk.school || '-') + '</td>';
                    html += '<td class="gensmall">' + (team ? team.name : (pk.team_name || '-')) + '</td>';
                    html += '<td class="gensmall">' + (pk.notes || '') + '</td></tr>';
                }
                if (picks.length === 0) html += '<tr class="row1"><td colspan="6" class="gensmall" style="text-align:center;">No picks</td></tr>';
                html += '</table>';
            }
            if (!html) html = '<p class="gensmall" style="text-align:center;">No mock drafts available</p>';
            container.innerHTML = html;
            renderFooter();
        }).catch(function(err) {
            console.error('Failed to load data:', err);
            if (loading) loading.textContent = 'Failed to load data. Please refresh.';
        });
    });
</script>
</body>
</html>
