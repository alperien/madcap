<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MADCAP - Mock Draft Board</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav"><ul>
            <li><a href="index.html"><b>MADCAP</b></a></li><li><span class="middot">&middot;</span></li>
            <li><a href="drafts.html"><b>Drafts</b></a></li><li><span class="middot">&middot;</span></li>
            <li><a href="mockdraft.html"><b>Mock Draft</b></a></li><li><span class="middot">&middot;</span></li>
            <li><a href="admin/login"><b>Admin</b></a></li>
        </ul></nav>
    </div>
    <div class="breadcrumb"><a href="index.html">MADCAP</a><span class="middot">&middot;</span>Mock Draft Board</div>
    <div id="loading-indicator" style="text-align:center;padding:20px;display:none;">Loading...</div>
    <div id="mockdraft-container"></div>
    <div id="page-footer"><table class="forumline"><tr><td class="catHead tCenter">MADCAP v2.0</td></tr></table></div>
</div>
<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var loading = document.getElementById('loading-indicator');
    if (loading) loading.style.display = 'block';
    loadAllData().then(function() {
        if (loading) loading.style.display = 'none';
        var mocks = DATA.mock_drafts || [];
        var html = '';
        for (var m = 0; m < mocks.length; m++) {
            var md = mocks[m];
            html += '<table class="forumline"><tr><th class="catHead" colspan="7">' + (md.title||'Mock Draft') + '</th></tr>';
            html += '<tr class="row2"><td colspan="7" class="gensmall">By: ' + (md.author||'-') + ' | Date: ' + (md.date||'-') + ' | Year: ' + (md.year||'-') + '</td></tr>';
            html += '<tr><th class="thHead tCenter">#</th><th class="thHead">Player</th><th class="thHead">Pos</th><th class="thHead">School</th><th class="thHead tCenter">OVR</th><th class="thHead">Proj Team</th><th class="thHead">Analysis</th></tr>';
            var picks = md.picks || [];
            for (var i = 0; i < picks.length; i++) {
                var pk = picks[i];
                var p = pk.player_id ? getPlayerById(pk.player_id) : null;
                var name = p ? '<a href="player.html?id=' + pk.player_id + '">' + p.name + '</a>' : (pk.player_name || (pk.player_id||'').replace(/_/g,' '));
                var isFic = p && p.is_fictional;
                html += '<tr class="' + rowClass(i) + '"><td class="tCenter bold">' + pk.rank + '</td>';
                html += '<td>' + name + (isFic ? ' <span class="fic">[FIC]</span>' : '') + '</td>';
                html += '<td class="tCenter">' + (pk.position||'-') + '</td><td class="gensmall">' + (pk.school||'-') + '</td>';
                html += '<td class="tCenter bold">' + (pk.overall||'-') + '</td><td class="gensmall">' + (pk.projected_team||'-') + '</td>';
                html += '<td class="gensmall">' + (pk.analysis||'') + '</td></tr>';
            }
            html += '</table>';
        }
        if (!html) html = '<p class="gensmall tCenter">No mock drafts available</p>';
        document.getElementById('mockdraft-container').innerHTML = html;
    });
});
</script>
</body>
</html>
