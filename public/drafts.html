<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MADCAP Draft History">
    <title>MADCAP - Draft History</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>

    <div class="breadcrumb">
        <a href="index.html">MADCAP Index</a><span class="middot">&middot;</span> Draft History
    </div>

    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>
    <div id="drafts-container"></div>
    <div id="page-footer"></div>
</div>

<script src="js/app.js"></script>
<script src="js/editors.js"></script>
<script src="js/render.js"></script>
<script src="js/drafts.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var loading = document.getElementById('loading-indicator');
        if (loading) loading.style.display = 'block';
        loadAllData().then(function() {
            if (loading) loading.style.display = 'none';
            renderDrafts();
            renderFooter();
        }).catch(function(err) {
            console.error('Failed to load data:', err);
            if (loading) loading.textContent = 'Failed to load data. Please refresh.';
        });
    });
</script>
</body>
</html>
