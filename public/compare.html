<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MADCAP Player Comparison Tool">
    <title>MADCAP - Player Comparison</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>

    <div class="breadcrumb">
        <a href="index.html">MADCAP Index</a><span class="middot">&middot;</span> Player Comparison
    </div>

    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>

    <div class="filters-bar">
        <label>Player 1: <select id="compare-p1" class="post"><option value="">Select...</option></select></label>
        <label>Player 2: <select id="compare-p2" class="post"><option value="">Select...</option></select></label>
        <button type="button" class="liteoption" onclick="doCompare()">Compare</button>
    </div>

    <div id="compare-container"></div>
    <div id="page-footer"></div>
</div>

<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var loading = document.getElementById('loading-indicator');
        if (loading) loading.style.display = 'block';
        loadAllData().then(function() {
            if (loading) loading.style.display = 'none';
            var s1 = document.getElementById('compare-p1');
            var s2 = document.getElementById('compare-p2');
            for (var i = 0; i < DATA.players.length; i++) {
                var p = DATA.players[i];
                var opt = '<option value="' + p.id + '">' + p.name + ' (' + (p.position||'') + ')</option>';
                s1.innerHTML += opt;
                s2.innerHTML += opt;
            }
            var params = new URLSearchParams(window.location.search);
            var ids = (params.get('ids') || '').split(',').filter(Boolean);
            if (ids.length >= 1) s1.value = ids[0];
            if (ids.length >= 2) { s2.value = ids[1]; doCompare(); }
            renderFooter();
        });
    });
    function doCompare() {
        var id1 = document.getElementById('compare-p1').value;
        var id2 = document.getElementById('compare-p2').value;
        if (!id1 || !id2) { alert('Select two players'); return; }
        var p1 = getPlayerById(id1);
        var p2 = getPlayerById(id2);
        if (!p1 || !p2) return;
        var stats1 = getLastSeasonStats(p1);
        var stats2 = getLastSeasonStats(p2);
        var cats = ['ppg','apg','rpg','spg','bpg','fg_pct','fg3_pct','ft_pct'];
        var labels = ['PPG','APG','RPG','SPG','BPG','FG%','3P%','FT%'];
        var html = '<table class="comparison-table"><tr><th></th><th>' + p1.name + '</th><th>' + p2.name + '</th></tr>';
        html += '<tr><td class="gensmall">Position</td><td>' + (p1.position||'-') + '</td><td>' + (p2.position||'-') + '</td></tr>';
        html += '<tr><td class="gensmall">Overall</td><td class="' + (p1.overall > p2.overall ? 'better' : 'worse') + '">' + (p1.overall||'-') + '</td><td class="' + (p2.overall > p1.overall ? 'better' : 'worse') + '">' + (p2.overall||'-') + '</td></tr>';
        for (var i = 0; i < cats.length; i++) {
            var v1 = stats1[cats[i]] || 0;
            var v2 = stats2[cats[i]] || 0;
            var fmt = cats[i].indexOf('pct') !== -1 ? pctStr : numStr;
            html += '<tr><td class="gensmall">' + labels[i] + '</td>';
            html += '<td class="' + (v1 > v2 ? 'better' : (v1 < v2 ? 'worse' : '')) + '">' + fmt(v1) + '</td>';
            html += '<td class="' + (v2 > v1 ? 'better' : (v2 < v1 ? 'worse' : '')) + '">' + fmt(v2) + '</td></tr>';
        }
        html += '</table>';
        document.getElementById('compare-container').innerHTML = html;
    }
    function getLastSeasonStats(player) {
        var stats = {};
        if (player.career && player.career.pro) {
            for (var i = player.career.pro.length - 1; i >= 0; i--) {
                var pro = player.career.pro[i];
                if (pro.seasons && pro.seasons.length > 0) return pro.seasons[pro.seasons.length - 1];
            }
        }
        if (player.career && player.career.college && player.career.college.seasons && player.career.college.seasons.length > 0) {
            return player.career.college.seasons[player.career.college.seasons.length - 1];
        }
        return stats;
    }
</script>
</body>
</html>
