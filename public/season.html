<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MADCAP - Season Details</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>
    <div class="breadcrumb"><a href="index.html">MADCAP</a><span class="middot">&middot;</span><span id="bc-season">Season</span></div>
    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>
    <div id="season-container"></div>
    <div id="page-footer"></div>
</div>
<script src="js/app.js"></script>
<script src="js/editors.js"></script>
<script src="js/render.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var loading = document.getElementById('loading-indicator');
    if (loading) loading.style.display = 'block';
    loadAllData().then(function() {
        if (loading) loading.style.display = 'none';
        var params = new URLSearchParams(window.location.search);
        var year = params.get('year');
        var league = params.get('league');
        var container = document.getElementById('season-container');
        var season = null;
        for (var i = 0; i < DATA.seasons.length; i++) {
            if (DATA.seasons[i].year === year && DATA.seasons[i].league === league) { season = DATA.seasons[i]; break; }
        }
        if (!season) { container.innerHTML = '<p class="gensmall">Season not found.</p>'; return; }
        document.getElementById('bc-season').textContent = year + ' ' + league + ' Season';
        var html = '<table class="forumline"><tr><th class="catHead" colspan="2">' + year + ' ' + league + ' Season</th></tr>';
        html += '<tr class="row1"><td class="gensmall" style="width:120px;">Year</td><td class="gensmall">' + (season.year||'-') + '</td></tr>';
        html += '<tr class="row2"><td class="gensmall">League</td><td class="gensmall">' + (season.league||'-') + '</td></tr>';
        html += '<tr class="row1"><td class="gensmall">Status</td><td class="gensmall">' + (season.status||'-') + '</td></tr>';
        if (season.champion) html += '<tr class="row2"><td class="gensmall">Champion</td><td class="gensmall bold">' + season.champion + '</td></tr>';
        if (season.mvp) html += '<tr class="row1"><td class="gensmall">MVP</td><td class="gensmall bold">' + season.mvp + '</td></tr>';
        html += '</table>';
        container.innerHTML = html;
        renderFooter();
    });
});
</script>
</body>
</html>
