<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MADCAP - Injury Report</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav"><ul>
            <li><a href="index.html"><b>MADCAP</b></a></li><li><span class="middot">&middot;</span></li>
            <li><a href="players.html"><b>Players</b></a></li><li><span class="middot">&middot;</span></li>
            <li><a href="injuries.html"><b>Injuries</b></a></li><li><span class="middot">&middot;</span></li>
            <li><a href="admin/login"><b>Admin</b></a></li>
        </ul></nav>
    </div>
    <div class="breadcrumb"><a href="index.html">MADCAP</a><span class="middot">&middot;</span>Injury Report</div>
    <div id="loading-indicator" style="text-align:center;padding:20px;display:none;">Loading...</div>
    <div id="injury-report"></div>
    <div id="page-footer"><table class="forumline"><tr><td class="catHead tCenter">MADCAP v2.0</td></tr></table></div>
</div>
<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var loading = document.getElementById('loading-indicator');
    if (loading) loading.style.display = 'block';
    loadAllData().then(function() {
        if (loading) loading.style.display = 'none';
        var injuries = DATA.injuries || [];
        var active = injuries.filter(function(i) { return i.status !== 'resolved'; });
        var resolved = injuries.filter(function(i) { return i.status === 'resolved'; });
        var html = '<table class="forumline"><tr><th class="catHead" colspan="7">Active Injuries</th></tr>';
        html += '<tr><th class="thHead">Player</th><th class="thHead">Injury</th><th class="thHead">Severity</th><th class="thHead">Date</th><th class="thHead">Status</th><th class="thHead tCenter">Games Missed</th><th class="thHead">Notes</th></tr>';
        for (var i = 0; i < active.length; i++) {
            var inj = active[i]; var p = getPlayerById(inj.player_id);
            html += '<tr class="' + rowClass(i) + '"><td><a href="player.html?id=' + inj.player_id + '">' + (p ? p.name : inj.player_id) + '</a></td>';
            html += '<td>' + (inj.type||'-') + '</td><td>' + renderInjuryIndicator(inj.severity) + '</td><td class="gensmall">' + (inj.date||'-') + '</td>';
            html += '<td class="injury-active">' + (inj.status||'-') + '</td><td class="tCenter">' + (inj.games_missed||0) + '</td><td class="gensmall">' + (inj.notes||'') + '</td></tr>';
        }
        if (active.length === 0) html += '<tr class="row1"><td colspan="7" class="gensmall tCenter" style="color:#006600;">All players healthy</td></tr>';
        html += '</table>';

        html += '<table class="forumline"><tr><th class="catHead" colspan="7">Injury History</th></tr>';
        html += '<tr><th class="thHead">Player</th><th class="thHead">Injury</th><th class="thHead">Severity</th><th class="thHead">Date</th><th class="thHead">Return</th><th class="thHead tCenter">Games Missed</th><th class="thHead">Notes</th></tr>';
        for (var i = 0; i < resolved.length; i++) {
            var inj = resolved[i]; var p = getPlayerById(inj.player_id);
            html += '<tr class="' + rowClass(i) + '"><td><a href="player.html?id=' + inj.player_id + '">' + (p ? p.name : inj.player_id) + '</a></td>';
            html += '<td>' + (inj.type||'-') + '</td><td>' + renderInjuryIndicator(inj.severity) + '</td><td class="gensmall">' + (inj.date||'-') + '</td>';
            html += '<td class="gensmall">' + (inj.return_date||'-') + '</td><td class="tCenter">' + (inj.games_missed||0) + '</td><td class="gensmall">' + (inj.notes||'') + '</td></tr>';
        }
        if (resolved.length === 0) html += '<tr class="row1"><td colspan="7" class="gensmall tCenter">No injury history</td></tr>';
        html += '</table>';
        document.getElementById('injury-report').innerHTML = html;
    });
});
</script>
</body>
</html>
