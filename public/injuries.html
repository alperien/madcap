<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MADCAP Injury Report">
    <title>MADCAP - Injury Report</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>

    <div class="breadcrumb">
        <a href="index.html">MADCAP Index</a><span class="middot">&middot;</span> Injury Report
    </div>

    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>
    <div id="injuries-container"></div>
    <div id="page-footer"></div>
</div>

<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var loading = document.getElementById('loading-indicator');
        if (loading) loading.style.display = 'block';
        loadAllData().then(function() {
            if (loading) loading.style.display = 'none';
            var container = document.getElementById('injuries-container');
            var injuries = DATA.injuries || [];
            var html = '<div class="data-strip"><span class="gensmall">Showing ' + injuries.length + ' injury records</span></div>';
            html += '<table class="forumline"><tr><th class="catHead" colspan="8">Injury Report</th></tr>';
            html += '<tr><th class="thHead">#</th><th class="thHead">Player</th><th class="thHead">Type</th><th class="thHead">Severity</th><th class="thHead">Status</th><th class="thHead">Date</th><th class="thHead tCenter">Games Missed</th><th class="thHead">Notes</th></tr>';
            for (var i = 0; i < injuries.length; i++) {
                var inj = injuries[i];
                var player = getPlayerById(inj.player_id);
                var isNew = isRecent(inj.date);
                html += '<tr class="' + rowClass(i) + '"><td class="row-num">' + (i+1) + '</td>';
                html += '<td>' + (player ? '<a href="player.html?id=' + player.id + '">' + player.name + '</a>' : (inj.player_id || '').replace(/_/g, ' ')) + '</td>';
                html += '<td class="gensmall">' + (inj.type || '-') + '</td>';
                html += '<td>' + renderInjuryIndicator(inj.severity) + '</td>';
                html += '<td class="gensmall">' + (inj.status || '-') + (isNew ? ' <span class="blink-new">NEW</span>' : '') + '</td>';
                html += '<td class="gensmall">' + (inj.date || '-') + '</td>';
                html += '<td class="tCenter">' + (inj.games_missed || 0) + '</td>';
                html += '<td class="gensmall">' + (inj.notes || '') + '</td></tr>';
            }
            if (injuries.length === 0) html += '<tr class="row1"><td colspan="8" class="gensmall" style="text-align:center;">No injuries recorded</td></tr>';
            html += '</table>';
            container.innerHTML = html;
            renderFooter();
        }).catch(function(err) {
            console.error('Failed to load data:', err);
            if (loading) loading.textContent = 'Failed to load data. Please refresh.';
        });
    });
</script>
</body>
</html>
