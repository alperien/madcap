<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MADCAP Team Page - Team roster, depth chart, and game history">
    <title>MADCAP - Team Page</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>

    <div class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">MADCAP Index</a><span class="middot">&middot;</span>
        <a href="teams.html">Teams</a><span class="middot">&middot;</span>
        <span id="breadcrumb-team">Team Page</span>
    </div>

    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>

    <div id="team-header-section"></div>
    <div id="team-stats-section"></div>

    <table class="forumline">
        <tr><th class="catHead" colspan="8">Roster</th></tr>
        <tr><th class="thHead tCenter">#</th><th class="thHead">Name</th><th class="thHead tCenter">Pos</th><th class="thHead tCenter">HT</th><th class="thHead tCenter">WT</th><th class="thHead tCenter">OVR</th><th class="thHead">Archetype</th><th class="thHead">Status</th></tr>
        <tbody id="roster-body"></tbody>
    </table>

    <table class="forumline">
        <tr><th class="catHead" colspan="5">Depth Chart</th></tr>
        <tr><th class="thHead tCenter">PG</th><th class="thHead tCenter">SG</th><th class="thHead tCenter">SF</th><th class="thHead tCenter">PF</th><th class="thHead tCenter">C</th></tr>
        <tbody id="depth-chart-body"></tbody>
    </table>

    <table class="forumline">
        <tr><th class="catHead" colspan="5">Recent Games</th></tr>
        <tr><th class="thHead">#</th><th class="thHead">Date</th><th class="thHead">Opponent</th><th class="thHead tCenter">Result</th><th class="thHead tCenter">Score</th></tr>
        <tbody id="team-games-body"></tbody>
    </table>

    <div id="page-footer"></div>
</div>

<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script src="js/teams.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var loading = document.getElementById('loading-indicator');
        if (loading) loading.style.display = 'block';
        loadAllData().then(function() {
            if (loading) loading.style.display = 'none';
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            if (id) renderTeamPage(id);
            else if (document.getElementById('team-header-section')) {
                document.getElementById('team-header-section').innerHTML = '<table class="forumline"><tr><td class="row1" style="padding:6px;">No team ID specified. <a href="teams.html">Browse teams</a></td></tr></table>';
            }
            renderFooter();
        }).catch(function(err) {
            console.error('Failed to load data:', err);
            if (loading) loading.textContent = 'Failed to load data. Please refresh.';
        });
    });
</script>
</body>
</html>
