<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MADCAP Players Database - Browse and search all players">
    <title>MADCAP - Players Database</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>

    <div class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">MADCAP Index</a><span class="middot" aria-hidden="true">&middot;</span> Players Database
    </div>

    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>

    <div class="filters-bar">
        <label for="search-input">Search: <input type="text" id="search-input" class="post" placeholder="Name..."></label>
        <label for="filter-league">League:
            <select id="filter-league" class="post">
                <option value="">All</option>
                <option value="NBA">NBA</option>
                <option value="GLEAGUE">G League</option>
                <option value="NCAA D1">NCAA D1</option>
                <option value="FIBA">FIBA</option>
            </select>
        </label>
        <label for="filter-pos">Position:
            <select id="filter-pos" class="post">
                <option value="">All</option>
                <option value="PG">PG</option>
                <option value="SG">SG</option>
                <option value="SF">SF</option>
                <option value="PF">PF</option>
                <option value="C">C</option>
            </select>
        </label>
        <label for="filter-status">Status:
            <select id="filter-status" class="post">
                <option value="">All</option>
                <option value="active">Active</option>
                <option value="free_agent">Free Agent</option>
                <option value="injured">Injured</option>
                <option value="retired">Retired</option>
            </select>
        </label>
        <label><input type="checkbox" id="filter-fictional"> Fictional Only</label>
        <button type="button" id="add-player-btn" onclick="openPlayerEditor(null)" style="display:none;" class="liteoption">+ Add Player</button>
    </div>

    <div class="bulk-bar" id="bulk-bar">
        <span>Selected: <b id="bulk-count">0</b></span>
        <button type="button" onclick="bulkDeletePlayers()">Delete Selected</button>
    </div>

    <div class="data-strip"><span id="player-count" class="gensmall">Loading...</span></div>

    <table class="forumline">
        <tr><th class="catHead" colspan="15">Player Database</th></tr>
        <tr>
            <th class="thHead">#</th>
            <th class="thHead" id="edit-col-header" style="display:none;"><input type="checkbox" onclick="toggleAllBulk(this)"></th>
            <th class="thHead"><a href="#" data-sort="name">Name</a></th>
            <th class="thHead"><a href="#" data-sort="position">Pos</a></th>
            <th class="thHead">Age</th>
            <th class="thHead"><a href="#" data-sort="height">HT</a></th>
            <th class="thHead"><a href="#" data-sort="weight">WT</a></th>
            <th class="thHead">Team</th>
            <th class="thHead"><a href="#" data-sort="overall">OVR</a></th>
            <th class="thHead">PPG</th>
            <th class="thHead">APG</th>
            <th class="thHead">RPG</th>
            <th class="thHead"><a href="#" data-sort="status">Status</a></th>
            <th class="thHead" id="edit-col-header" style="display:none;">Actions</th>
        </tr>
        <tbody id="player-tbody"></tbody>
    </table>

    <div id="page-footer"></div>
</div>

<script src="js/app.js"></script>
<script src="js/editors.js"></script>
<script src="js/render.js"></script>
<script src="js/players.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var loading = document.getElementById('loading-indicator');
        if (loading) loading.style.display = 'block';
        loadAllData().then(function() {
            if (loading) loading.style.display = 'none';
            renderPlayerList();
            setupPlayerFilters();
            renderFooter();
        }).catch(function(err) {
            console.error('Failed to load data:', err);
            if (loading) loading.textContent = 'Failed to load data. Please refresh.';
        });
    });
    function toggleAllBulk(cb) {
        var boxes = document.querySelectorAll('.bulk-checkbox');
        for (var i = 0; i < boxes.length; i++) boxes[i].checked = cb.checked;
        updateBulkCount();
    }
    function updateBulkCount() {
        var checked = document.querySelectorAll('.bulk-checkbox:checked');
        var el = document.getElementById('bulk-count');
        if (el) el.textContent = checked.length;
    }
    function bulkDeletePlayers() {
        var checked = document.querySelectorAll('.bulk-checkbox:checked');
        if (checked.length === 0) { alert('No players selected'); return; }
        if (!confirm('Delete ' + checked.length + ' player(s)?')) return;
        var promises = [];
        for (var i = 0; i < checked.length; i++) {
            promises.push(fetch('api/players/' + checked[i].getAttribute('data-id'), { method: 'DELETE' }));
        }
        Promise.all(promises).then(function() { loadAllData().then(refreshCurrentPage); });
    }
    document.addEventListener('change', function(e) { if (e.target.classList.contains('bulk-checkbox')) updateBulkCount(); });
</script>
</body>
</html>
