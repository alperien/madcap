<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MADCAP - Player Lore</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav"><ul>
            <li><a href="index.html"><b>MADCAP</b></a></li><li><span class="middot">&middot;</span></li>
            <li><a href="players.html"><b>Players</b></a></li><li><span class="middot">&middot;</span></li>
            <li><a href="admin/login"><b>Admin</b></a></li>
        </ul></nav>
    </div>
    <div class="breadcrumb"><a href="index.html">MADCAP</a><span class="middot">&middot;</span><a href="players.html">Players</a><span class="middot">&middot;</span><span id="bc-player">Lore</span></div>
    <div id="loading-indicator" style="text-align:center;padding:20px;display:none;">Loading...</div>
    <div id="lore-container"></div>
    <div id="page-footer"><table class="forumline"><tr><td class="catHead tCenter">MADCAP v2.0</td></tr></table></div>
</div>
<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var loading = document.getElementById('loading-indicator');
    if (loading) loading.style.display = 'block';
    loadAllData().then(function() {
        if (loading) loading.style.display = 'none';
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        var player = getPlayerById(id);
        if (!player) { document.getElementById('lore-container').innerHTML = '<p>Player not found.</p>'; return; }
        document.getElementById('bc-player').innerHTML = '<a href="player.html?id=' + id + '">' + player.name + '</a> - Lore';
        fetch('api/players/' + id + '/lore').then(function(r) { return r.json(); }).then(function(data) {
            var content = data.content || 'No lore available for this player.';
            var html = '<div class="data-strip"><span class="ds-label">Player:</span> <span class="ds-value"><a href="player.html?id=' + id + '">' + player.name + '</a></span>';
            html += ' <span class="ds-label">Pos:</span> <span class="ds-value">' + (player.position||'-') + '</span>';
            html += ' <span class="ds-label">OVR:</span> <span class="ds-value">' + (player.overall||'-') + '</span>';
            if (player.is_fictional) html += ' <span class="fictional-badge">FICTIONAL</span>';
            html += '</div>';
            html += '<div class="lore-article">' + renderMarkdown(content) + '</div>';
            // Related events
            var events = DATA.events.filter(function(e) { return e.player_id === id; });
            if (events.length > 0) {
                html += '<table class="forumline"><tr><th class="catHead">Related Events</th></tr>';
                for (var i = 0; i < events.length; i++) {
                    var e = events[i];
                    html += '<tr class="' + rowClass(i) + '"><td><div class="timeline-post"><div class="post-header"><span class="event-type">' + (e.type||'') + '</span><span class="gensmall">' + (e.date||'') + '</span></div>';
                    html += '<div class="post-body"><span class="bold">' + (e.title||'') + '</span><br><span class="gensmall">' + (e.description||'') + '</span></div></div></td></tr>';
                }
                html += '</table>';
            }
            document.getElementById('lore-container').innerHTML = html;
        });
    });
});
</script>
</body>
</html>
