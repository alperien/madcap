<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MADCAP - Player Game Log</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>
    <div class="breadcrumb"><a href="index.html">MADCAP</a><span class="middot">&middot;</span><a href="players.html">Players</a><span class="middot">&middot;</span><span id="bc-player">Game Log</span></div>
    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>

    <div class="data-strip" id="player-summary"></div>
    <div class="data-strip gensmall">Note: Full game log is now available on the <a href="#" id="player-profile-link">player profile page</a> under the Game Log tab.</div>
    <div class="filters-bar">
        <label>Season: <select id="filter-season" onchange="renderGameLog()"><option value="">All</option></select></label>
        <label>Level: <select id="filter-level" onchange="renderGameLog()"><option value="">All</option><option value="pro">Pro</option><option value="college">College</option><option value="highschool">HS</option></select></label>
    </div>
    <div id="gamelog-container"></div>

    <div id="page-footer"></div>
</div>
<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script>
var GAME_LOG = [];
var PLAYER = null;
document.addEventListener('DOMContentLoaded', function() {
    var loading = document.getElementById('loading-indicator');
    if (loading) loading.style.display = 'block';
    loadAllData().then(function() {
        if (loading) loading.style.display = 'none';
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        PLAYER = getPlayerById(id);
        if (!PLAYER) { document.getElementById('gamelog-container').innerHTML = '<p class="gensmall">Player not found.</p>'; return; }
        document.getElementById('bc-player').textContent = PLAYER.name + ' - Game Log';
        document.getElementById('player-summary').innerHTML = '<span class="ds-label">Player:</span> <span class="ds-value"><a href="player.html?id=' + id + '">' + PLAYER.name + '</a></span> <span class="ds-label">Pos:</span> <span class="ds-value">' + (PLAYER.position||'-') + '</span> <span class="ds-label">OVR:</span> <span class="ds-value">' + (PLAYER.overall||'-') + '</span>';
        document.getElementById('player-profile-link').href = 'player.html?id=' + id + '#gamelog';
        fetch('api/players/' + id + '/game-log').then(function(r) { return r.json(); }).then(function(data) {
            GAME_LOG = data;
            var seasons = {};
            data.forEach(function(g) { if (g.season) seasons[g.season] = true; });
            var sel = document.getElementById('filter-season');
            Object.keys(seasons).sort().forEach(function(s) { sel.innerHTML += '<option value="' + s + '">' + s + '</option>'; });
            var seasonParam = params.get('season');
            if (seasonParam) sel.value = seasonParam;
            renderGameLog();
        });
        renderFooter();
    });
});

function renderGameLog() {
    var seasonF = document.getElementById('filter-season').value;
    var levelF = document.getElementById('filter-level').value;
    var games = GAME_LOG.filter(function(g) {
        if (seasonF && g.season !== seasonF) return false;
        if (levelF && g.level !== levelF) return false;
        return true;
    });
    var html = '<table class="stat-table"><tr><th>#</th><th>Date</th><th>Opp</th><th>Result</th><th>Team</th><th>MIN</th><th>PTS</th><th>AST</th><th>REB</th><th>STL</th><th>BLK</th><th>FG</th><th>3P</th><th>FT</th></tr>';
    for (var i = 0; i < games.length; i++) {
        var g = games[i];
        html += '<tr><td class="row-num">' + (i+1) + '</td><td>' + (g.date||'-') + '</td><td>' + (g.opponent||'-') + '</td><td>' + (g.result||'-') + '</td><td>' + (g.team||'-') + '</td>';
        html += '<td>' + (g.mins||'-') + '</td><td><b>' + (g.pts||0) + '</b></td><td>' + (g.ast||0) + '</td><td>' + (g.reb||0) + '</td>';
        html += '<td>' + (g.stl||0) + '</td><td>' + (g.blk||0) + '</td>';
        html += '<td>' + (g.fg_made||0) + '-' + (g.fg_att||0) + '</td><td>' + (g.fg3_made||0) + '-' + (g.fg3_att||0) + '</td><td>' + (g.ft_made||0) + '-' + (g.ft_att||0) + '</td></tr>';
    }
    if (games.length === 0) html += '<tr><td colspan="14" style="text-align:center;">No games found</td></tr>';
    html += '</table><p class="gensmall">' + games.length + ' games shown</p>';
    document.getElementById('gamelog-container').innerHTML = html;
}
window.renderGameLog = renderGameLog;
</script>
</body>
</html>
