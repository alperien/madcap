<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MADCAP Player Profile - Detailed player statistics and career information">
    <title>MADCAP - Player Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>

    <div class="breadcrumb">
        <a href="index.html">MADCAP Index</a><span class="middot">&middot;</span>
        <a href="players.html">Players</a><span class="middot">&middot;</span>
        <span id="breadcrumb-player">Player Profile</span>
    </div>

    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>

    <!-- 1. Player Header Info Box -->
    <div id="player-header-section"></div>

    <!-- Tab Navigation (phpBB-style) -->
    <div class="player-tab-bar" id="player-tab-bar" style="display:none;">
        <a href="#overview" data-tab="overview" class="active">Overview</a>
        <a href="#career" data-tab="career">Career Stats</a>
        <a href="#gamelog" data-tab="gamelog">Game Log</a>
        <a href="#awards" data-tab="awards">Awards & Transactions</a>
        <a href="#lore" data-tab="lore">Lore</a>
        <a href="#scouting" data-tab="scouting">Scouting</a>
    </div>

    <!-- TAB: Overview -->
    <div class="player-tab-content active" id="tab-overview">
        <!-- 2K Attributes & Badges Panel -->
        <div id="attributes-section"></div>

        <!-- Quick Stats Summary -->
        <div id="quick-stats-section"></div>

        <!-- Stat Progression Charts -->
        <table class="forumline">
            <tr><th class="catHead" colspan="2">Stat Progression</th></tr>
            <tr>
                <td class="row1" style="width:50%;padding:3px;">
                    <div class="chart-box"><div class="catHead">PPG</div><canvas id="ppg-chart"></canvas></div>
                </td>
                <td class="row2" style="width:50%;padding:3px;">
                    <div class="chart-box"><div class="catHead">APG</div><canvas id="apg-chart"></canvas></div>
                </td>
            </tr>
            <tr>
                <td class="row3" style="padding:3px;">
                    <div class="chart-box"><div class="catHead">RPG</div><canvas id="rpg-chart"></canvas></div>
                </td>
                <td class="row4" style="padding:3px;">
                    <div class="chart-box"><div class="catHead">Shooting Splits</div><canvas id="shooting-chart"></canvas></div>
                </td>
            </tr>
        </table>
    </div>

    <!-- TAB: Career Stats -->
    <div class="player-tab-content" id="tab-career">
        <a name="career-stats"></a>
        <table class="forumline">
            <tr><th class="catHead" colspan="15">Career Statistics</th></tr>
            <tr>
                <th class="thHead">#</th><th class="thHead">Season</th><th class="thHead">Level</th><th class="thHead">Team/School</th>
                <th class="thHead tCenter">GP</th><th class="thHead tCenter">GS</th><th class="thHead tCenter">MPG</th>
                <th class="thHead tCenter">PPG</th><th class="thHead tCenter">APG</th><th class="thHead tCenter">RPG</th>
                <th class="thHead tCenter">SPG</th><th class="thHead tCenter">BPG</th>
                <th class="thHead tCenter">FG%</th><th class="thHead tCenter">3P%</th><th class="thHead tCenter">FT%</th>
            </tr>
            <tbody id="career-stats-body"></tbody>
        </table>

        <!-- Draft Information -->
        <table class="forumline" id="draft-info-table-wrap">
            <tr><th class="catHead" colspan="2">Draft Information</th></tr>
            <tbody id="draft-info-body"></tbody>
        </table>

        <!-- Contract Details -->
        <div id="contract-section"></div>
    </div>

    <!-- TAB: Game Log (merged from gamelog.html) -->
    <div class="player-tab-content" id="tab-gamelog">
        <div id="gamelog-section"></div>
    </div>

    <!-- TAB: Awards & Transactions -->
    <div class="player-tab-content" id="tab-awards">
        <!-- Award Trophy Case -->
        <div id="awards-section"></div>

        <!-- Injury History -->
        <div id="injuries-section"></div>

        <!-- Transaction History -->
        <div id="transactions-section"></div>
    </div>

    <!-- TAB: Lore (merged from lore.html) -->
    <div class="player-tab-content" id="tab-lore">
        <!-- Career Timeline / Lore -->
        <table class="forumline">
            <tr><th class="catHead">Career Timeline / Lore</th></tr>
            <tbody id="career-timeline"></tbody>
        </table>

        <!-- Full Lore Article (fetched from API) -->
        <div id="lore-article-section"></div>
    </div>

    <!-- TAB: Scouting -->
    <div class="player-tab-content" id="tab-scouting">
        <!-- Scouting Notes -->
        <div class="notes-box">
            <div class="catHead">Scouting Notes</div>
            <div class="notes-content" id="scouting-notes"></div>
        </div>

        <!-- Media Clippings -->
        <div id="media-section"></div>

        <!-- Physical Measurements -->
        <div id="measurements-section"></div>
    </div>

    <div id="page-footer"></div>
</div>

<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script src="js/players.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var loading = document.getElementById('loading-indicator');
        if (loading) loading.style.display = 'block';
        loadAllData().then(function() {
            if (loading) loading.style.display = 'none';
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            if (id) {
                renderPlayerProfile(id);
                var tabBar = document.getElementById('player-tab-bar');
                if (tabBar) tabBar.style.display = '';
                setupPlayerTabs();
            } else if (document.getElementById('player-header-section')) {
                document.getElementById('player-header-section').innerHTML = '<table class="forumline"><tr><td class="row1" style="padding:6px;">No player ID specified. <a href="players.html">Browse players</a></td></tr></table>';
            }
            renderFooter();
        }).catch(function(err) {
            console.error('Failed to load data:', err);
            if (loading) loading.textContent = 'Failed to load data. Please refresh.';
        });
    });
</script>
</body>
</html>
