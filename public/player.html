<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MADCAP Player Profile - Detailed player statistics and career information">
    <title>MADCAP - Player Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>

    <div class="breadcrumb">
        <a href="index.html">MADCAP Index</a><span class="middot">&middot;</span>
        <a href="players.html">Players</a><span class="middot">&middot;</span>
        <span id="breadcrumb-player">Player Profile</span>
    </div>

    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>

    <!-- 1. Player Header Info Box -->
    <div id="player-header-section"></div>

    <!-- 2. Quick Stats Strip -->
    <div id="quick-stats-section"></div>

    <!-- 3. Attributes, Badges & Tendencies (compact) -->
    <div id="attributes-section"></div>

    <!-- 4. Stat Progression Charts (compact) -->
    <div id="charts-section">
        <table class="forumline">
            <tr><th class="catHead" colspan="4">Stat Progression</th></tr>
            <tr>
                <td class="row1" style="width:25%;padding:2px;">
                    <div class="chart-box"><div class="catHead">PPG</div><div class="chart-canvas-wrap"><canvas id="ppg-chart"></canvas></div></div>
                </td>
                <td class="row2" style="width:25%;padding:2px;">
                    <div class="chart-box"><div class="catHead">APG</div><div class="chart-canvas-wrap"><canvas id="apg-chart"></canvas></div></div>
                </td>
                <td class="row1" style="width:25%;padding:2px;">
                    <div class="chart-box"><div class="catHead">RPG</div><div class="chart-canvas-wrap"><canvas id="rpg-chart"></canvas></div></div>
                </td>
                <td class="row2" style="width:25%;padding:2px;">
                    <div class="chart-box"><div class="catHead">Shooting</div><div class="chart-canvas-wrap"><canvas id="shooting-chart"></canvas></div></div>
                </td>
            </tr>
        </table>
    </div>

    <!-- 5. Career Statistics -->
    <a name="career-stats"></a>
    <table class="forumline">
        <tr><th class="catHead" colspan="15">Career Statistics</th></tr>
        <tr>
            <th class="thHead">#</th><th class="thHead">Season</th><th class="thHead">Level</th><th class="thHead">Team/School</th>
            <th class="thHead tCenter">GP</th><th class="thHead tCenter">GS</th><th class="thHead tCenter">MPG</th>
            <th class="thHead tCenter">PPG</th><th class="thHead tCenter">APG</th><th class="thHead tCenter">RPG</th>
            <th class="thHead tCenter">SPG</th><th class="thHead tCenter">BPG</th>
            <th class="thHead tCenter">FG%</th><th class="thHead tCenter">3P%</th><th class="thHead tCenter">FT%</th>
        </tr>
        <tbody id="career-stats-body"></tbody>
    </table>

    <!-- 6. Game Log -->
    <div id="gamelog-section"></div>

    <!-- 7. Draft Information -->
    <table class="forumline" id="draft-info-table-wrap">
        <tr><th class="catHead" colspan="2">Draft Information</th></tr>
        <tbody id="draft-info-body"></tbody>
    </table>

    <!-- 8. Contract Details -->
    <div id="contract-section"></div>

    <!-- 9. Award Trophy Case -->
    <div id="awards-section"></div>

    <!-- 10. Injury History -->
    <div id="injuries-section"></div>

    <!-- 11. Transaction History -->
    <div id="transactions-section"></div>

    <!-- 12. Career Timeline / Lore -->
    <table class="forumline">
        <tr><th class="catHead">Career Timeline / Lore</th></tr>
        <tbody id="career-timeline"></tbody>
    </table>

    <!-- 13. Full Lore Article -->
    <div id="lore-article-section"></div>

    <!-- 14. Scouting Notes -->
    <div class="notes-box">
        <div class="catHead">Scouting Notes</div>
        <div class="notes-content" id="scouting-notes"></div>
    </div>

    <!-- 15. Media Clippings -->
    <div id="media-section"></div>

    <!-- 16. Physical Measurements -->
    <div id="measurements-section"></div>

    <div id="page-footer"></div>
</div>

<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script src="js/charts.js"></script>
<script src="js/players.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var loading = document.getElementById('loading-indicator');
        if (loading) loading.style.display = 'block';
        loadAllData().then(function() {
            if (loading) loading.style.display = 'none';
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            if (id) {
                renderPlayerProfile(id);
            } else if (document.getElementById('player-header-section')) {
                document.getElementById('player-header-section').innerHTML = '<table class="forumline"><tr><td class="row1" style="padding:6px;">No player ID specified. <a href="players.html">Browse players</a></td></tr></table>';
            }
            renderFooter();
        }).catch(function(err) {
            console.error('Failed to load data:', err);
            if (loading) loading.textContent = 'Failed to load data. Please refresh.';
        });
    });
</script>
</body>
</html>
