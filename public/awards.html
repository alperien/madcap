<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MADCAP Award History">
    <title>MADCAP - Awards</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>

    <div class="breadcrumb">
        <a href="index.html">MADCAP Index</a><span class="middot">&middot;</span> Award History
    </div>

    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>
    <div id="awards-container"></div>
    <div id="page-footer"></div>
</div>

<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var loading = document.getElementById('loading-indicator');
        if (loading) loading.style.display = 'block';
        loadAllData().then(function() {
            if (loading) loading.style.display = 'none';
            var container = document.getElementById('awards-container');
            var awards = DATA.awards || {};
            var html = '';
            var categories = Object.keys(awards);
            if (categories.length === 0) {
                html = '<p class="gensmall" style="text-align:center;">No awards data available</p>';
            } else {
                for (var c = 0; c < categories.length; c++) {
                    var cat = categories[c];
                    var entries = awards[cat] || [];
                    html += '<table class="forumline"><tr><th class="catHead" colspan="4">' + cat.replace(/_/g, ' ').toUpperCase() + '</th></tr>';
                    html += '<tr><th class="thHead">#</th><th class="thHead">Year</th><th class="thHead">Player</th><th class="thHead">League</th></tr>';
                    for (var i = 0; i < entries.length; i++) {
                        var a = entries[i];
                        var player = a.player_id ? getPlayerById(a.player_id) : null;
                        html += '<tr class="' + rowClass(i) + '"><td class="row-num">' + (i+1) + '</td>';
                        html += '<td class="gensmall">' + (a.year || '-') + '</td>';
                        html += '<td>' + (player ? '<a href="player.html?id=' + player.id + '">' + player.name + '</a>' : (a.player_name || a.player_id || '-').replace(/_/g, ' ')) + '</td>';
                        html += '<td class="gensmall">' + (a.league || '-') + '</td></tr>';
                    }
                    if (entries.length === 0) html += '<tr class="row1"><td colspan="4" class="gensmall" style="text-align:center;">No entries</td></tr>';
                    html += '</table>';
                }
            }
            container.innerHTML = html;
            renderFooter();
        }).catch(function(err) {
            console.error('Failed to load data:', err);
            if (loading) loading.textContent = 'Failed to load data. Please refresh.';
        });
    });
</script>
</body>
</html>
