<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MADCAP Teams Database - Browse all teams">
    <title>MADCAP - Teams Database</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>

    <div class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">MADCAP Index</a><span class="middot" aria-hidden="true">&middot;</span> Teams Database
    </div>

    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>

    <div class="filters-bar">
        <label for="filter-league">League:
            <select id="filter-league" class="post">
                <option value="">All</option>
                <option value="NBA">NBA</option>
                <option value="GLEAGUE">G League</option>
                <option value="NCAA D1">NCAA D1</option>
                <option value="FIBA">FIBA</option>
            </select>
        </label>
        <button type="button" id="add-team-btn" onclick="openTeamEditor(null)" style="display:none;" class="liteoption">+ Add Team</button>
    </div>

    <table class="forumline">
        <tr><th class="catHead" colspan="10">Team Database</th></tr>
        <tr>
            <th class="thHead">#</th>
            <th class="thHead">Team</th><th class="thHead">Abbr</th><th class="thHead">League</th>
            <th class="thHead">Conference</th><th class="thHead">Division</th>
            <th class="thHead tCenter">W-L</th><th class="thHead tCenter">Win%</th><th class="thHead tCenter">Conf Rank</th>
            <th class="thHead" id="edit-col-header" style="display:none;">Actions</th>
        </tr>
        <tbody id="team-tbody"></tbody>
    </table>

    <div id="page-footer"></div>
</div>

<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script src="js/teams.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var loading = document.getElementById('loading-indicator');
        if (loading) loading.style.display = 'block';
        loadAllData().then(function() {
            if (loading) loading.style.display = 'none';
            renderTeamList();
            document.getElementById('filter-league').addEventListener('change', renderTeamList);
            renderFooter();
        }).catch(function(err) {
            console.error('Failed to load data:', err);
            if (loading) loading.textContent = 'Failed to load data. Please refresh.';
        });
    });
</script>
</body>
</html>
