<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MADCAP - Game Detail</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav"><ul>
            <li><a href="index.html"><b>MADCAP</b></a></li><li><span class="middot">&middot;</span></li>
            <li><a href="schedule.html"><b>Schedule</b></a></li><li><span class="middot">&middot;</span></li>
            <li><a href="admin/login"><b>Admin</b></a></li>
        </ul></nav>
    </div>
    <div class="breadcrumb"><a href="index.html">MADCAP</a><span class="middot">&middot;</span><a href="schedule.html">Schedule</a><span class="middot">&middot;</span>Game Detail</div>
    <div id="loading-indicator" style="text-align:center;padding:20px;display:none;">Loading...</div>
    <div id="game-detail"></div>
    <div id="page-footer"><table class="forumline"><tr><td class="catHead tCenter">MADCAP v2.0</td></tr></table></div>
</div>
<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var loading = document.getElementById('loading-indicator');
    if (loading) loading.style.display = 'block';
    loadAllData().then(function() {
        if (loading) loading.style.display = 'none';
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        var game = null;
        for (var i = 0; i < DATA.games.length; i++) { if (DATA.games[i].id === id) { game = DATA.games[i]; break; } }
        if (!game) { document.getElementById('game-detail').innerHTML = '<p>Game not found.</p>'; return; }
        var home = getTeamById(game.home_team_id);
        var away = getTeamById(game.away_team_id);
        var homeName = home ? home.name : (game.home_team_name || game.home_team_id || '?');
        var awayName = away ? away.name : (game.away_team_name || game.away_team_id || '?');

        var html = '<table class="forumline"><tr><th class="catHead" colspan="3">Game Summary</th></tr>';
        html += '<tr class="row1"><td class="tCenter" style="width:40%;font-size:14px;font-weight:bold;">' + awayName + '<br><span style="font-size:24px;">' + (game.away_score||0) + '</span></td>';
        html += '<td class="tCenter gensmall" style="width:20%;">vs<br>' + (game.date||'') + '<br>' + (game.time||'') + '<br><b>' + (game.status||'') + '</b></td>';
        html += '<td class="tCenter" style="width:40%;font-size:14px;font-weight:bold;">' + homeName + '<br><span style="font-size:24px;">' + (game.home_score||0) + '</span></td></tr>';
        html += '<tr class="row2"><td colspan="3" class="gensmall tCenter">Venue: ' + (game.venue||'-') + ' | Attendance: ' + (game.attendance||'-') + ' | Season: ' + (game.season||'-') + '</td></tr></table>';

        function renderBoxScore(players, label) {
            if (!players || players.length === 0) return '';
            var bhtml = '<table class="box-score-table"><tr><th colspan="14">' + label + '</th></tr>';
            bhtml += '<tr><th>Player</th><th>MIN</th><th>PTS</th><th>AST</th><th>REB</th><th>STL</th><th>BLK</th><th>TOV</th><th>FG</th><th>3P</th><th>FT</th><th>+/-</th><th>PF</th></tr>';
            var totals = {pts:0,ast:0,reb:0,stl:0,blk:0,tov:0,fg_made:0,fg_att:0,fg3_made:0,fg3_att:0,ft_made:0,ft_att:0};
            for (var i = 0; i < players.length; i++) {
                var p = players[i];
                var player = getPlayerById(p.player_id);
                var name = player ? '<a href="player.html?id=' + p.player_id + '">' + player.name + '</a>' : (p.player_id || '?');
                bhtml += '<tr><td style="text-align:left;">' + name + '</td><td>' + (p.mins||0) + '</td><td><b>' + (p.pts||0) + '</b></td>';
                bhtml += '<td>' + (p.ast||0) + '</td><td>' + (p.reb||0) + '</td><td>' + (p.stl||0) + '</td><td>' + (p.blk||0) + '</td><td>' + (p.tov||0) + '</td>';
                bhtml += '<td>' + (p.fg_made||0) + '-' + (p.fg_att||0) + '</td><td>' + (p.fg3_made||0) + '-' + (p.fg3_att||0) + '</td><td>' + (p.ft_made||0) + '-' + (p.ft_att||0) + '</td>';
                bhtml += '<td>' + (p.plus_minus > 0 ? '+' : '') + (p.plus_minus||0) + '</td><td>' + (p.fouls||0) + '</td></tr>';
                for (var k in totals) { totals[k] += (p[k]||0); }
            }
            bhtml += '<tr class="team-totals"><td style="text-align:left;"><b>TOTALS</b></td><td></td><td><b>' + totals.pts + '</b></td>';
            bhtml += '<td>' + totals.ast + '</td><td>' + totals.reb + '</td><td>' + totals.stl + '</td><td>' + totals.blk + '</td><td>' + totals.tov + '</td>';
            bhtml += '<td>' + totals.fg_made + '-' + totals.fg_att + '</td><td>' + totals.fg3_made + '-' + totals.fg3_att + '</td><td>' + totals.ft_made + '-' + totals.ft_att + '</td><td></td><td></td></tr>';
            bhtml += '</table>';
            return bhtml;
        }

        var bs = game.box_score || {};
        html += renderBoxScore(bs.away, awayName + ' Box Score');
        html += renderBoxScore(bs.home, homeName + ' Box Score');
        document.getElementById('game-detail').innerHTML = html;
    });
});
</script>
</body>
</html>
