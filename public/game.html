<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MADCAP - Game Details</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>
    <div class="breadcrumb"><a href="index.html">MADCAP</a><span class="middot">&middot;</span><a href="schedule.html">Schedule</a><span class="middot">&middot;</span><span id="bc-game">Game Details</span></div>
    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>
    <div id="game-container"></div>
    <div id="page-footer"></div>
</div>
<script src="js/app.js"></script>
<script src="js/render.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var loading = document.getElementById('loading-indicator');
    if (loading) loading.style.display = 'block';
    loadAllData().then(function() {
        if (loading) loading.style.display = 'none';
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        var container = document.getElementById('game-container');
        var game = null;
        for (var i = 0; i < DATA.games.length; i++) {
            if (DATA.games[i].id === id) { game = DATA.games[i]; break; }
        }
        if (!game) { container.innerHTML = '<p class="gensmall">Game not found. <a href="schedule.html">View schedule</a></p>'; return; }
        var home = getTeamById(game.home_team_id);
        var away = getTeamById(game.away_team_id);
        var html = '<table class="forumline"><tr><th class="catHead" colspan="3">Game Details - ' + (game.date || '') + '</th></tr>';
        html += '<tr class="row1"><td class="tCenter" style="padding:6px;width:40%;">';
        html += '<span style="font-size:14px;font-weight:bold;">' + (away ? away.name : (game.away_team_id || '?')) + '</span><br>';
        html += '<span style="font-size:20px;font-weight:bold;">' + (game.away_score || 0) + '</span>';
        html += '</td><td class="tCenter gensmall" style="width:20%;">@<br>' + (game.status || '') + '</td>';
        html += '<td class="tCenter" style="padding:6px;width:40%;">';
        html += '<span style="font-size:14px;font-weight:bold;">' + (home ? home.name : (game.home_team_id || '?')) + '</span><br>';
        html += '<span style="font-size:20px;font-weight:bold;">' + (game.home_score || 0) + '</span>';
        html += '</td></tr>';
        html += '<tr class="row2"><td colspan="3" class="gensmall" style="padding:4px;">';
        html += 'League: ' + (game.league || '-') + ' | Venue: ' + (game.venue || '-') + ' | Time: ' + (game.time || '-');
        html += '</td></tr></table>';
        if (game.box_score) {
            html += '<table class="box-score-table"><tr><th colspan="12" class="catHead">Box Score</th></tr>';
            html += '<tr><th>Player</th><th>MIN</th><th>PTS</th><th>AST</th><th>REB</th><th>STL</th><th>BLK</th><th>FG</th><th>3P</th><th>FT</th><th>+/-</th><th>PF</th></tr>';
            for (var i = 0; i < game.box_score.length; i++) {
                var bs = game.box_score[i];
                var p = getPlayerById(bs.player_id);
                html += '<tr><td>' + (p ? '<a href="player.html?id=' + p.id + '">' + p.name + '</a>' : (bs.player_id || '?')) + '</td>';
                html += '<td>' + (bs.mins||0) + '</td><td><b>' + (bs.pts||0) + '</b></td><td>' + (bs.ast||0) + '</td><td>' + (bs.reb||0) + '</td>';
                html += '<td>' + (bs.stl||0) + '</td><td>' + (bs.blk||0) + '</td>';
                html += '<td>' + (bs.fg_made||0) + '-' + (bs.fg_att||0) + '</td><td>' + (bs.fg3_made||0) + '-' + (bs.fg3_att||0) + '</td><td>' + (bs.ft_made||0) + '-' + (bs.ft_att||0) + '</td>';
                html += '<td>' + (bs.plus_minus||0) + '</td><td>' + (bs.pf||0) + '</td></tr>';
            }
            html += '</table>';
        }
        container.innerHTML = html;
        document.getElementById('bc-game').textContent = (away ? away.abbreviation : '?') + ' @ ' + (home ? home.abbreviation : '?') + ' - ' + (game.date || '');
        renderFooter();
    });
});
</script>
</body>
</html>
