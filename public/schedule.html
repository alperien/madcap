<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MADCAP Schedule & Results">
    <title>MADCAP - Schedule & Results</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="body-container">
    <div id="page-header">
        <nav id="main-nav" aria-label="Main navigation"></nav>
        <div id="top-bar"></div>
    </div>

    <div class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">MADCAP Index</a><span class="middot">&middot;</span> Schedule & Results
    </div>

    <div id="loading-indicator" class="loading-text" style="display:none;">Loading data</div>

    <div class="filters-bar">
        <label for="filter-league">League:
            <select id="filter-league" class="post">
                <option value="">All</option>
                <option value="NBA">NBA</option>
                <option value="GLEAGUE">G League</option>
                <option value="FIBA">FIBA</option>
            </select>
        </label>
        <label for="filter-status">Status:
            <select id="filter-status" class="post">
                <option value="">All</option>
                <option value="final">Final</option>
                <option value="scheduled">Scheduled</option>
            </select>
        </label>
    </div>

    <div class="data-strip"><span id="schedule-count" class="gensmall">Loading...</span></div>

    <table class="forumline">
        <tr><th class="catHead" colspan="10">Schedule & Results</th></tr>
        <tr><th class="thHead">#</th><th class="thHead">Date</th><th class="thHead">Time</th><th class="thHead">League</th><th class="thHead">Away</th><th class="thHead tCenter">@</th><th class="thHead">Home</th><th class="thHead tCenter">Score</th><th class="thHead tCenter">Status</th><th class="thHead">Venue</th></tr>
        <tbody id="schedule-body"></tbody>
    </table>

    <div id="page-footer"></div>
</div>

<script src="js/app.js"></script>
<script src="js/editors.js"></script>
<script src="js/render.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var loading = document.getElementById('loading-indicator');
        if (loading) loading.style.display = 'block';
        loadAllData().then(function() {
            if (loading) loading.style.display = 'none';
            renderSchedule();
            document.getElementById('filter-league').addEventListener('change', renderSchedule);
            document.getElementById('filter-status').addEventListener('change', renderSchedule);
            renderFooter();
        }).catch(function(err) {
            console.error('Failed to load data:', err);
            if (loading) loading.textContent = 'Failed to load data. Please refresh.';
        });
    });
</script>
</body>
</html>
