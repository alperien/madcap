  headline: Hornets Lock Up Thompson With $72M Extension
  content: The Charlotte Hornets have secured their franchise point guard with a 4-year,
    $72 million extension. Thompson, 24, has emerged as one of the top playmakers
    in the Eastern Conference.
  source: MADCAP Transactions
